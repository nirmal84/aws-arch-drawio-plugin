AWSTemplateFormatVersion: '2010-09-09'
Description: Event-driven serverless API — API Gateway → Lambda → DynamoDB + SQS consumer

Parameters:
  Environment:
    Type: String
    Default: dev

Resources:
  # API Gateway
  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${Environment}-orders-api'
      Description: Orders REST API

  # Order Handler Lambda
  OrderHandlerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${Environment}-order-handler'
      Runtime: nodejs20.x
      Handler: handler.main
      Role: !GetAtt OrderHandlerRole.Arn
      Code:
        ZipFile: |
          exports.main = async (event) => ({ statusCode: 200 });
      Environment:
        Variables:
          TABLE_NAME: !Ref OrdersTable
          QUEUE_URL: !Ref ProcessingQueue

  # DynamoDB Table
  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${Environment}-orders'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: orderId
          AttributeType: S
      KeySchema:
        - AttributeName: orderId
          KeyType: HASH

  # SQS Queue
  ProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${Environment}-order-processing'
      VisibilityTimeout: 300

  # Queue Consumer Lambda
  QueueConsumerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${Environment}-queue-consumer'
      Runtime: nodejs20.x
      Handler: consumer.main
      Role: !GetAtt ConsumerRole.Arn
      Code:
        ZipFile: |
          exports.main = async (event) => console.log(event);
      Environment:
        Variables:
          TABLE_NAME: !Ref OrdersTable

  # Event source mapping: SQS → Consumer Lambda
  QueueConsumerMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      FunctionName: !Ref QueueConsumerFunction
      EventSourceArn: !GetAtt ProcessingQueue.Arn
      BatchSize: 10
      Enabled: true

  # SNS Topic for notifications
  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${Environment}-order-notifications'

  # S3 Bucket for order artifacts
  ArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${Environment}-order-artifacts'

  # IAM Roles
  OrderHandlerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: OrderHandlerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt OrdersTable.Arn
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt ProcessingQueue.Arn
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref NotificationTopic

  ConsumerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ConsumerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt ProcessingQueue.Arn
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt OrdersTable.Arn
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub '${ArtifactsBucket.Arn}/*'

Outputs:
  ApiUrl:
    Value: !Sub 'https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'
  TableName:
    Value: !Ref OrdersTable
  QueueUrl:
    Value: !Ref ProcessingQueue
